<!DOCTYPE html>

    <title>Wiki - Dranima</title>
    <link rel="stylesheet" href="styles.css">

                    <linearGradient id="starGradWiki" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#bf3500"/>
                        <stop offset="50%" stop-color="#A52E00"/>
                        <stop offset="100%" stop-color="#8a2600"/>

                </defs>

            <h1>Wiki</h1>
