<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dranima</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>
<body>

    <!-- ====== NAVBAR ====== -->
    <nav class="navbar" id="main">
        <div class="navbar-logo">
            <img src="images/head_logo.png" alt="Dranima Logo" class="navbar-logo-image">
        </div>
        <div class="navbar-links">
            <a href="#main">Main</a>
            <a href="#news">Project</a>
            <a href="#wiki">Wiki</a>
            <a href="#steam">Steam Page</a>
            <a href="#contact">Contact</a>
            <a href="#credits">Credits</a>
        </div>
    </nav>

    <!-- ====== HERO ====== -->
    <section class="hero" id="hero">
        <div class="hero-info">
            <span class="hero-label">Phase:</span>
            <span class="hero-value">Prototype</span>
            <hr class="hero-divider">
            <span class="hero-label">Release Date:</span>
            <span class="hero-value">TBA</span>
        </div>
        <img class="hero-icon" src="images/head_background_icon.png" alt="Dranima Hero Image" class="hero-icon">
    </section>

    <!-- ====== NEWS ====== -->
    <section class="section-news" id="news">
        <h2>News</h2>
    </section>

    <!-- ====== SCREENSHOTS ====== -->
    <section class="section-screenshots" id="screenshots">
        <h2>Screenshots</h2>
    </section>

    <!-- ====== FAQ ====== -->
    <section class="section-faq" id="faq">
        <h2>FAQ</h2>
    </section>

    <!-- ====== FOOTER ====== -->
    <footer class="footer" id="footer">
        <p>&copy; 2026 Dranima. All rights reserved.</p>
    </footer>

</body>
</html>
