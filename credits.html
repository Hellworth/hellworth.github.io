<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits - Dranima</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="script/script.js" defer></script>
</head>
<body>

    <!-- ====== LOADER ====== -->
    <div id="loader">
        <div class="loader-bg"><img src="images/body_background.png" alt=""></div>
        <div class="loader-content">
            <div class="loader-spinner">
                <div class="loader-dot" style="--i:0"></div>
                <div class="loader-dot" style="--i:1"></div>
                <div class="loader-dot" style="--i:2"></div>
                <div class="loader-dot" style="--i:3"></div>
                <div class="loader-dot" style="--i:4"></div>
                <div class="loader-dot" style="--i:5"></div>
                <div class="loader-dot" style="--i:6"></div>
                <div class="loader-dot" style="--i:7"></div>
            </div>
            <span class="loader-text">Loading...</span>
        </div>
    </div>

    <!-- ====== NAVBAR ====== -->
    <div id="navbar-container"></div>

    <!-- ====== HERO ====== -->
    <section class="hero hero-credits" id="hero">
        <div class="credits-title-box">
            <svg class="credits-star" viewBox="0 0 200 200" overflow="visible" xmlns="http://www.w3.org/2000/svg">
                <polygon points="100,0 118,22 141,12 148,38 171,29 166,56 189,59 172,80 200,100 172,120 189,141 166,144 171,171 148,162 141,188 118,178 100,200 82,178 59,188 52,162 29,171 34,144 11,141 28,120 0,100 28,80 11,59 34,56 29,29 52,38 59,12 82,22"
                    fill="url(#starGrad)" stroke="#fff" stroke-width="3"/>
                <defs>
                    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#bf3500"/>
                        <stop offset="50%" stop-color="#A52E00"/>
                        <stop offset="100%" stop-color="#8a2600"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>Credits</h1>
        </div>
    </section>

    <!-- ====== CREDITS ====== -->
    <section class="section-credits bg-pattern spike-top spike-bottom" id="credits">
        <div id="credits-container"></div>
    </section>

    <!-- ====== GUEST DRANIMON ARTISTS ====== -->
    <section class="section-guest-artists" id="guest-artists">
        <h2>Guest Dranimae Artists</h2>
        <div class="credits-guest-list" id="credits-guest-container"></div>
    </section>

    <!-- ====== FOOTER ====== -->
    <div id="footer-container"></div>

</body>
</html>
