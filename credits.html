<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits - Dranima</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- ====== LOADER ====== -->
    <div id="loader">
        <div class="loader-bg"><img src="images/body_background.png" alt=""></div>
        <div class="loader-content">
            <div class="loader-spinner">
                <div class="loader-dot" style="--i:0"></div>
                <div class="loader-dot" style="--i:1"></div>
                <div class="loader-dot" style="--i:2"></div>
                <div class="loader-dot" style="--i:3"></div>
                <div class="loader-dot" style="--i:4"></div>
                <div class="loader-dot" style="--i:5"></div>
                <div class="loader-dot" style="--i:6"></div>
                <div class="loader-dot" style="--i:7"></div>
            </div>
            <span class="loader-text">Loading...</span>
        </div>
    </div>

    <!-- ====== NAVBAR ====== -->
    <div id="navbar-container"></div>

    <!-- ====== HERO ====== -->
    <section class="hero hero-credits" id="hero">
        <div class="credits-title-box">
            <h1>Credits</h1>
        </div>
    </section>

    <!-- ====== CREDITS ====== -->
    <section class="section-credits bg-pattern spike-top spike-bottom" id="credits">
        <div id="credits-container"></div>
    </section>

    <!-- ====== GUEST DRANIMON ARTISTS ====== -->
    <section class="section-guest-artists" id="guest-artists">
        <h2>Guest Dranimae Artists</h2>
        <div class="credits-guest-list" id="credits-guest-container"></div>
    </section>

    <!-- ====== FOOTER ====== -->
    <footer id="footer">
        <div class="footer-main bg-pattern spike-top">
            <div class="footer-columns">
                <div class="footer-col">
                    <h3>Contact:</h3>
                    <ul>
                        <li>-Gmail</li>
                        <li><a href="mailto:booksofdranima@gmail.com">booksofdranima@gmail.com</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h3>Legal:</h3>
                    <ul>
                        <li><a href="#">-Policy</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h3>Follow us:</h3>
                    <ul>
                        <li><a href="#">-Instagram</a></li>
                        <li><a href="#">-Twitter</a></li>
                        <li><a href="#">-Discord</a></li>
                        <li><a href="#">-Bluesky</a></li>
                        <li><a href="#">-Ko-fi</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="subfooter">
            <p>&copy; 2026 Dranima Studio / Alexandre Claude Bourbon &ndash; All rights reserved</p>
        </div>
    </footer>

</body>
</html>
